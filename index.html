<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Biga — Trattoria Moderna</title>
<meta name="description" content="Carta digital de Biga Trattoria Moderna. Auténtica cocina italiana en Salamanca.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --green: #78BE20;
  --green-dark: #5a9a10;
  --bg: #FDFBF7;
  --text: #2C2C2C;
  --muted: #7A7A7A;
  --light: #B0B0B0;
  --border: #EDEBE6;
  --card: #FFFFFF;
  --red: #E53935;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'DM Sans',sans-serif; background:var(--bg);
  color:var(--text); -webkit-font-smoothing:antialiased; line-height:1.6;
}

/* HEADER */
.header {
  position:sticky; top:0; z-index:100;
  background:rgba(253,251,247,0.92);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border); padding:12px 0;
}
.header-inner {
  max-width:680px; margin:0 auto; padding:0 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.header-logo { height:36px; width:auto; }
.hero-logo { height:80px; width:auto; margin-bottom:12px; }
.lang-bar { display:flex; gap:4px; }
.lang-btn {
  background:none; border:1.5px solid var(--border); border-radius:8px;
  padding:5px 10px; font-family:'DM Sans',sans-serif; font-size:12px;
  font-weight:500; color:var(--muted); cursor:pointer; transition:all .2s;
  text-transform:uppercase; letter-spacing:0.5px;
}
.lang-btn.active { background:var(--green); color:#fff; border-color:var(--green); }
.lang-btn:hover:not(.active) { border-color:var(--green); color:var(--green); }

/* HERO */
.hero { text-align:center; padding:40px 20px 24px; max-width:680px; margin:0 auto; }

.hero-tagline { font-family:'Caveat',cursive; font-size:20px; color:var(--muted); }
.demo-badge {
  margin-top:16px; padding:10px 16px; background:#FFF8E1;
  border-radius:12px; font-size:12px; color:#F57F17; line-height:1.5;
  display:inline-block;
}

/* TRANSLATING */
.translating-bar { text-align:center; padding:8px 20px; animation:pulse 1.5s infinite; }
.translating-inner {
  display:inline-flex; align-items:center; gap:8px; font-size:13px;
  color:var(--green); font-weight:500; background:rgba(120,190,32,0.08);
  padding:6px 16px; border-radius:20px;
}
.translating-inner svg { animation:spin 1s linear infinite; }

/* NAV */
.nav-cats {
  max-width:680px; margin:0 auto; padding:0 20px 14px;
  display:flex; gap:8px; overflow-x:auto;
  scrollbar-width:none; -ms-overflow-style:none;
}
.nav-cats::-webkit-scrollbar { display:none; }
.nav-btn {
  flex-shrink:0; padding:7px 16px; border-radius:20px;
  border:1.5px solid var(--border); background:var(--card);
  font-size:13px; font-weight:500; color:var(--muted); cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all .2s;
}
.nav-btn:hover, .nav-btn:active { background:var(--green); color:#fff; border-color:var(--green); }

/* FILTER */
.filter-section { max-width:680px; margin:0 auto 8px; padding:0 20px; }
.filter-toggle {
  display:flex; align-items:center; gap:8px; cursor:pointer;
  padding:12px 0; font-size:14px; font-weight:500; color:var(--muted);
  border:none; background:none; font-family:'DM Sans',sans-serif;
}
.filter-toggle svg { transition:transform .3s; }
.filter-toggle.open svg { transform:rotate(180deg); }
.filter-pills { display:none; flex-wrap:wrap; gap:8px; padding:0 0 16px; }
.filter-pills.show { display:flex; }
.filter-count {
  background:var(--red); color:#fff; border-radius:50%;
  width:18px; height:18px; display:inline-flex; align-items:center;
  justify-content:center; font-size:10px; font-weight:700; margin-left:4px;
}
.pill {
  display:flex; align-items:center; gap:5px; padding:6px 12px;
  border-radius:20px; border:1.5px solid var(--border); font-size:12px;
  font-weight:500; cursor:pointer; background:var(--card); color:var(--muted);
  font-family:'DM Sans',sans-serif; transition:all .2s;
}
.pill.active { border-color:var(--red); background:#FFF5F5; color:var(--red); }
.pill .emoji { font-size:14px; }

/* MENU */
.menu { max-width:680px; margin:0 auto; padding:0 20px 60px; }
.cat-section { margin-bottom:44px; }
.cat-header {
  font-family:'Playfair Display',serif; font-size:28px; font-weight:700;
  color:var(--green); margin-bottom:4px; letter-spacing:-0.5px;
}
.cat-header.today-header { font-size:32px; }
.cat-sub { font-family:'Caveat',cursive; font-size:16px; color:var(--light); margin-bottom:16px; }
.cat-note {
  font-family:'Caveat',cursive; font-size:15px; color:var(--muted);
  margin-bottom:16px; line-height:1.5; padding:12px 16px;
  background:rgba(120,190,32,0.06); border-radius:12px;
  border-left:3px solid var(--green);
}
.today-badge {
  display:inline-block; background:linear-gradient(135deg,var(--green),var(--green-dark));
  color:#fff; padding:4px 14px; border-radius:20px; font-size:11px;
  font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px;
}
.menu-item { padding:16px 0; border-bottom:1px solid var(--border); animation:fadeIn .3s ease; }
.menu-item:last-child { border-bottom:none; }
.menu-item.hidden { display:none; }
.item-top { display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:4px; }
.item-name { font-weight:600; font-size:16px; color:var(--text); letter-spacing:-0.2px; }
.item-price {
  font-family:'Playfair Display',serif; font-weight:700; font-size:17px;
  color:var(--green); white-space:nowrap; flex-shrink:0;
}
.item-desc { font-size:14px; color:var(--muted); font-weight:300; line-height:1.5; }
.item-extra { font-size:12px; color:var(--green-dark); font-style:italic; margin-top:4px; font-weight:500; }
.item-allergens { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
.allergen-tag {
  display:inline-flex; align-items:center; gap:3px; font-size:11px;
  padding:2px 8px; border-radius:10px; background:#F5F3EE; color:var(--muted);
  transition:all .2s;
}
.allergen-tag.highlight { background:#FFF0F0; color:var(--red); font-weight:600; }

/* FOOTER */
.footer {
  text-align:center; padding:32px 20px 48px; max-width:680px;
  margin:0 auto; border-top:1px solid var(--border);
}
.footer p { font-size:12px; color:var(--light); line-height:1.7; }
.footer .bold { font-weight:600; color:var(--muted); }

/* LOADING */
.loading-box { text-align:center; padding:80px 20px; }

@keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
@keyframes spin { from { transform:rotate(0deg) } to { transform:rotate(360deg) } }

@media(max-width:400px) {
  .hero-title { font-size:36px; }
  .cat-header { font-size:24px; }
  .lang-btn { padding:4px 8px; font-size:11px; }
}
</style>
</head>

// ─── CSV PARSER ───
function parseCSV(text) {
  const rows = []; let row = []; let cell = ""; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') { if (inQ && text[i+1] === '"') { cell += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { row.push(cell.trim()); cell = ""; }
    else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      row.push(cell.trim()); if (row.some(c=>c)) rows.push(row); row = []; cell = "";
    } else cell += ch;
  }
  row.push(cell.trim()); if (row.some(c=>c)) rows.push(row);
  if (rows.length < 2) return [];
  const hdr = rows[0].map(h => h.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/ /g,"_"));
  return rows.slice(1).map(r => { const o = {}; hdr.forEach((h,i) => o[h] = (r[i]||"").trim()); return o; });
}

function normalizeRow(row) {
  const cat = row.categoria || row.cat || "";
  const name = row.nombre || row.nombre_es || row.name || "";
  const desc = row.descripcion || row.descripcion_es || row.desc || "";
  const price = row.precio || row.price || "";
  const extra = row.extra || row.precio_extra || "";
  const allergens = [];
  // Try direct match first, then search all keys for partial match
  ALLERGEN_COLS.forEach(a => {
    let v = (row[a] || "");
    if (!v) {
      // Search all row keys for a match (handles encoding issues)
      const keys = Object.keys(row);
      for (let k of keys) {
        if (k.includes(a) || a.includes(k)) { v = row[k] || ""; break; }
      }
    }
    v = v.toUpperCase().trim();
    if (v === "X" || v === "1" || v === "SI" || v === "SÍ") allergens.push(a);
  });
  return { cat, name, desc, price, extra, allergens };
}

function isToday(cat) {
  const c = cat.toLowerCase();
  return c.includes("hoy") || c.includes("today") || c.includes("oggi") || c.includes("aujourd");
}

// ─── GETTERS (use pre-built translations, "Hoy Tenemos" stays in Spanish) ───
function getCatDisplay(cat) { return TRANSLATIONS[currentLang]?.categories?.[cat] || cat; }
function getCatNote(cat) {
  if (currentLang === "es") return CAT_NOTES[cat]?.es || "";
  return TRANSLATIONS[currentLang]?.notes?.[cat] || "";
}
function getItemDisplay(item) {
  if (currentLang === "es") return { name:item.name, desc:item.desc, extra:item.extra };
  const t = TRANSLATIONS[currentLang]?.items?.[item.name];
  return { name:t?.name||item.name, desc:t?.desc||item.desc, extra:t?.extra||item.extra };
}

// ─── RENDER ───
function renderLangBar() {
  const bar = document.getElementById("langBar");
  bar.innerHTML = ["es","en","fr","it","pt"].map(l =>
    `<button class="lang-btn${l===currentLang?" active":""}" onclick="switchLang('${l}')">${l}</button>`
  ).join("");
}

function renderTranslatingBar() {
  document.getElementById("translatingBar").innerHTML = "";
}

function renderNav() {
  const nav = document.getElementById("navCats");
  const cats = [...new Set(menuData.map(i => i.cat))];
  nav.innerHTML = cats.map(cat => {
    const label = isToday(cat) ? "✨ "+getCatDisplay(cat) : getCatDisplay(cat);
    return `<button class="nav-btn" onclick="document.getElementById('cat-${CSS.escape(cat)}').scrollIntoView({behavior:'smooth',block:'start'})">${label}</button>`;
  }).join("");
}

function renderFilters() {
  const ui = UI[currentLang]||UI.es;
  document.getElementById("filterLabel").textContent = ui.filter;
  const countEl = document.getElementById("filterCount");
  if (activeAllergens.size > 0) {
    countEl.style.display = "inline-flex";
    countEl.textContent = activeAllergens.size;
    countEl.className = "filter-count";
  } else countEl.style.display = "none";

  const used = [...new Set(menuData.flatMap(i => i.allergens))].sort();
  const pills = document.getElementById("filterPills");
  pills.innerHTML = used.map(code => {
    const info = ALLERGEN_INFO[code];
    if (!info) return "";
    const active = activeAllergens.has(code);
    return `<button class="pill${active?" active":""}" onclick="toggleAllergen('${code}')"><span class="emoji">${info.emoji}</span>${info[currentLang]||info.es}</button>`;
  }).join("");
}

function renderMenu() {
  const container = document.getElementById("menuContainer");
  const ui = UI[currentLang]||UI.es;
  const cats = [...new Set(menuData.map(i => i.cat))];
  let html = "";

  cats.forEach(cat => {
    const items = menuData.filter(i => i.cat === cat);
    const visible = items.filter(i => activeAllergens.size === 0 || !i.allergens.some(a => activeAllergens.has(a)));
    if (!visible.length) return;

    const today = isToday(cat);
    const note = getCatNote(cat);
    const catDisplay = getCatDisplay(cat);

    html += `<div class="cat-section" id="cat-${cat}">`;
    if (today) html += `<div class="today-badge">${ui.today}</div>`;
    html += `<h2 class="cat-header${today?" today-header":""}">${catDisplay}</h2>`;
    if (note) html += `<div class="cat-note">${note}</div>`;

    visible.forEach(item => {
      const d = getItemDisplay(item);
      const hidden = activeAllergens.size > 0 && item.allergens.some(a => activeAllergens.has(a));
      html += `<div class="menu-item${hidden?" hidden":""}">`;
      html += `<div class="item-top"><span class="item-name">${d.name}</span><span class="item-price">${item.price}€</span></div>`;
      if (d.desc) html += `<div class="item-desc">${d.desc}</div>`;
      if (d.extra) html += `<div class="item-extra">${d.extra}</div>`;
      if (item.allergens.length) {
        html += '<div class="item-allergens">';
        item.allergens.forEach(a => {
          const info = ALLERGEN_INFO[a];
          if (info) html += `<span class="allergen-tag${activeAllergens.has(a)?" highlight":""}">${info.emoji} ${info[currentLang]||info.es}</span>`;
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderFooter() {
  const ui = UI[currentLang]||UI.es;
  document.getElementById("footerSection").innerHTML =
    `<p>${ui.footer1}</p><p class="bold">${ui.footer2}</p><p>${ui.footer3}</p>`;
}

function render() {
  const ui = UI[currentLang]||UI.es;
  document.getElementById("tagline").textContent = ui.tagline;
  renderLangBar();
  renderTranslatingBar();
  renderNav();
  renderFilters();
  renderMenu();
  renderFooter();

  if (!sheetConnected && !SHEET_CSV_URL) {
    document.getElementById("demoBadge").innerHTML = '<div class="demo-badge">Modo demo — conecta tu Google Sheet para datos en vivo</div>';
  } else {
    document.getElementById("demoBadge").innerHTML = "";
  }
}

// ─── ACTIONS ───
window.switchLang = function(lang) {
  currentLang = lang;
  render();
};

window.toggleAllergen = function(code) {
  if (activeAllergens.has(code)) activeAllergens.delete(code);
  else activeAllergens.add(code);
  renderFilters();
  renderMenu();
};

document.getElementById("filterToggle").addEventListener("click", function() {
  filtersOpen = !filtersOpen;
  this.classList.toggle("open", filtersOpen);
  document.getElementById("filterPills").classList.toggle("show", filtersOpen);
});

// ─── INIT ───
async function init() {
  document.getElementById("menuContainer").innerHTML =
    `<div class="loading-box"><div class="hero-title" style="font-size:36px;font-family:'Playfair Display',serif;color:var(--green);margin-bottom:16px">biga</div><p style="color:var(--muted);font-size:14px">${UI.es.loading}</p></div>`;

  if (SHEET_CSV_URL) {
    try {
      const res = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      console.log("CSV first line:", text.split("\n")[0]);
      const rows = parseCSV(text);
      if (rows.length > 0) {
        console.log("Parsed row keys:", Object.keys(rows[0]));
        console.log("First row:", JSON.stringify(rows[0]));
        menuData = rows.map(normalizeRow).filter(r => r.name);
        window._menuData = menuData;
        console.log("Menu items loaded:", menuData.length);
        if (menuData.length > 0) console.log("First item allergens:", menuData[0].allergens);
        sheetConnected = true;
        render();
        return;
      }
    } catch(e) { console.warn("Sheet fetch failed:", e); }
  }

  menuData = FALLBACK;
  sheetConnected = false;
  render();
}

init();
</script>
