<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Biga — Trattoria Moderna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --biga-green: #78BE20;
  --biga-dark-green: #5a9a10;
  --bg-cream: #FDFBF7;
  --text-dark: #2C2C2C;
  --text-muted: #7A7A7A;
  --text-light: #B0B0B0;
  --border-subtle: #EDEBE6;
  --card-bg: #FFFFFF;
  --shadow-soft: 0 2px 20px rgba(0,0,0,0.04);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-cream);
  color: var(--text-dark);
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}

/* ===== HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(253,251,247,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 12px 0;
}
.header-inner {
  max-width: 680px; margin: 0 auto; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-img { height: 40px; width: auto; }
.lang-switcher { display: flex; gap: 4px; }
.lang-btn {
  background: none; border: 1.5px solid var(--border-subtle);
  border-radius: 8px; padding: 5px 10px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  color: var(--text-muted); cursor: pointer; transition: all .2s;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.lang-btn.active {
  background: var(--biga-green); color: #fff;
  border-color: var(--biga-green);
}
.lang-btn:hover:not(.active) { border-color: var(--biga-green); color: var(--biga-green); }

/* ===== HERO ===== */
.hero {
  text-align: center; padding: 48px 20px 32px;
  max-width: 680px; margin: 0 auto;
}
.hero-logo { height: 80px; margin-bottom: 12px; }
.hero-tagline {
  font-family: 'Caveat', cursive; font-size: 20px;
  color: var(--text-muted); font-weight: 400;
}

/* ===== ALLERGEN FILTER ===== */
.filter-section {
  max-width: 680px; margin: 0 auto 8px; padding: 0 20px;
}
.filter-toggle {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 12px 0;
  font-size: 14px; font-weight: 500; color: var(--text-muted);
  border: none; background: none; font-family: 'DM Sans', sans-serif;
}
.filter-toggle svg { transition: transform .3s; }
.filter-toggle.open svg { transform: rotate(180deg); }
.filter-pills {
  display: none; flex-wrap: wrap; gap: 8px;
  padding: 0 0 16px;
}
.filter-pills.show { display: flex; }
.allergen-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px;
  border: 1.5px solid var(--border-subtle);
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all .2s; background: var(--card-bg);
  color: var(--text-muted);
}
.allergen-pill.active {
  border-color: #E53935; background: #FFF5F5; color: #E53935;
}
.allergen-pill .emoji { font-size: 14px; }

/* ===== MENU ===== */
.menu { max-width: 680px; margin: 0 auto; padding: 0 20px 60px; }

.category-section { margin-bottom: 40px; }
.category-header {
  font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700;
  color: var(--biga-green); margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.category-subtitle {
  font-family: 'Caveat', cursive; font-size: 16px;
  color: var(--text-light); margin-bottom: 20px;
}

.menu-item {
  padding: 16px 0;
  border-bottom: 1px solid var(--border-subtle);
  transition: opacity .3s;
}
.menu-item.hidden { display: none; }
.menu-item:last-child { border-bottom: none; }

.item-top {
  display: flex; justify-content: space-between;
  align-items: baseline; gap: 12px; margin-bottom: 4px;
}
.item-name {
  font-weight: 600; font-size: 16px; color: var(--text-dark);
  letter-spacing: -0.2px;
}
.item-price {
  font-family: 'Playfair Display', serif;
  font-weight: 700; font-size: 17px;
  color: var(--biga-green); white-space: nowrap;
  flex-shrink: 0;
}
.item-desc {
  font-size: 14px; color: var(--text-muted);
  font-weight: 300; line-height: 1.5;
}
.item-extra {
  font-size: 12px; color: var(--biga-dark-green);
  font-style: italic; margin-top: 4px; font-weight: 500;
}
.item-allergens {
  display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap;
}
.allergen-tag {
  font-size: 11px; padding: 2px 7px;
  border-radius: 10px; background: #F5F3EE;
  color: var(--text-muted);
}
.allergen-tag.highlight {
  background: #FFF5F5; color: #E53935;
  font-weight: 500;
}

/* ===== PIZZA INTRO ===== */
.category-note {
  font-family: 'Caveat', cursive; font-size: 15px;
  color: var(--text-muted); margin-bottom: 16px;
  line-height: 1.5; padding: 12px 16px;
  background: rgba(120,190,32,0.06);
  border-radius: 12px; border-left: 3px solid var(--biga-green);
}

/* ===== FOOTER ===== */
.footer {
  text-align: center; padding: 32px 20px 48px;
  max-width: 680px; margin: 0 auto;
  border-top: 1px solid var(--border-subtle);
}
.footer p {
  font-size: 12px; color: var(--text-light);
  line-height: 1.7;
}
.footer .arturo {
  font-weight: 600; color: var(--text-muted);
}

/* ===== NAV DOTS ===== */
.nav-cats {
  max-width: 680px; margin: 0 auto;
  padding: 0 20px 20px;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.nav-cats::-webkit-scrollbar { display: none; }
.nav-cat-btn {
  flex-shrink: 0; padding: 7px 16px;
  border-radius: 20px; border: 1.5px solid var(--border-subtle);
  background: var(--card-bg); font-size: 13px; font-weight: 500;
  color: var(--text-muted); cursor: pointer; transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}
.nav-cat-btn.active, .nav-cat-btn:hover {
  background: var(--biga-green); color: #fff;
  border-color: var(--biga-green);
}

@media (max-width: 400px) {
  .category-header { font-size: 24px; }
  .hero-logo { height: 60px; }
  .lang-btn { padding: 4px 8px; font-size: 11px; }
}
</style>
</head>

  tagline: {es:"Benvenuti a una auténtica trattoria moderna",en:"Welcome to an authentic modern trattoria",fr:"Bienvenue dans une authentique trattoria moderne",it:"Benvenuti in un'autentica trattoria moderna",pt:"Bem-vindos a uma autêntica trattoria moderna"},
  allergen_filter: {es:"Filtrar por alérgenos",en:"Filter by allergens",fr:"Filtrer par allergènes",it:"Filtra per allergeni",pt:"Filtrar por alérgenos"},
  footer_products: {es:"Todos nuestros platos los realizamos con productos de proximidad.",en:"All our dishes are made with locally sourced products.",fr:"Tous nos plats sont préparés avec des produits de proximité.",it:"Tutti i nostri piatti sono preparati con prodotti a km zero.",pt:"Todos os nossos pratos são feitos com produtos de proximidade."},
  footer_arturo: {es:"Todo el producto de cerdo ibérico es de ARTURO SÁNCHEZ.",en:"All Iberian pork products are from ARTURO SÁNCHEZ.",fr:"Tout le porc ibérique provient d'ARTURO SÁNCHEZ.",it:"Tutto il maiale iberico proviene da ARTURO SÁNCHEZ.",pt:"Todo o porco ibérico é de ARTURO SÁNCHEZ."},
  footer_prices: {es:"Precios en euros con IVA incluido.",en:"Prices in euros, VAT included.",fr:"Prix en euros, TVA incluse.",it:"Prezzi in euro, IVA inclusa.",pt:"Preços em euros com IVA incluído."},
};

let currentLang = 'es';
let activeAllergens = new Set();

function getT(obj, lang) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[lang] || obj['es'] || '';
}

function buildNav() {
  const nav = document.getElementById('navCats');
  nav.innerHTML = '';
  const catOrder = ['antipasti','pasta','pizza','dolci','cockteles','vini'];
  catOrder.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'nav-cat-btn';
    btn.textContent = getT(CATEGORIES[key].title, currentLang);
    btn.onclick = () => {
      document.getElementById('cat-'+key).scrollIntoView({behavior:'smooth',block:'start'});
    };
    nav.appendChild(btn);
  });
}

function buildAllergenFilters() {
  const container = document.getElementById('filterPills');
  container.innerHTML = '';
  const used = new Set();
  MENU_DATA.forEach(item => item.allergens.forEach(a => used.add(a)));
  Array.from(used).sort().forEach(key => {
    const info = ALLERGEN_INFO[key];
    if (!info) return;
    const pill = document.createElement('button');
    pill.className = 'allergen-pill' + (activeAllergens.has(key) ? ' active' : '');
    pill.innerHTML = '<span class="emoji">'+info.emoji+'</span> ' + getT(info.label, currentLang);
    pill.onclick = () => {
      if (activeAllergens.has(key)) activeAllergens.delete(key);
      else activeAllergens.add(key);
      pill.classList.toggle('active');
      filterMenu();
    };
    container.appendChild(pill);
  });
}

function toggleFilters() {
  const pills = document.getElementById('filterPills');
  const toggle = document.getElementById('filterToggle');
  pills.classList.toggle('show');
  toggle.classList.toggle('open');
}

function filterMenu() {
  document.querySelectorAll('.menu-item').forEach(el => {
    if (activeAllergens.size === 0) {
      el.classList.remove('hidden');
    } else {
      const itemAllergens = JSON.parse(el.dataset.allergens);
      const hasConflict = itemAllergens.some(a => activeAllergens.has(a));
      el.classList.toggle('hidden', hasConflict);
    }
  });
  // Highlight allergen tags
  document.querySelectorAll('.allergen-tag').forEach(tag => {
    tag.classList.toggle('highlight', activeAllergens.has(tag.dataset.allergen));
  });
}

function buildMenu() {
  const container = document.getElementById('menuContainer');
  container.innerHTML = '';
  const catOrder = ['antipasti','pasta','pizza','dolci','cockteles','vini'];
  
  catOrder.forEach(catKey => {
    const cat = CATEGORIES[catKey];
    const items = MENU_DATA.filter(i => i.cat === catKey);
    if (!items.length) return;
    
    const section = document.createElement('div');
    section.className = 'category-section';
    section.id = 'cat-' + catKey;

    let html = '<h2 class="category-header">' + getT(cat.title, currentLang) + '</h2>';
    const sub = getT(cat.sub, currentLang);
    if (sub) html += '<p class="category-subtitle">' + sub + '</p>';
    const note = getT(cat.note, currentLang);
    if (note) html += '<div class="category-note">' + note + '</div>';
    
    items.forEach(item => {
      const name = getT(item.name, currentLang);
      const desc = getT(item.desc, currentLang);
      const extra = getT(item.extra, currentLang);
      const priceStr = item.price + '€';
      
      html += '<div class="menu-item" data-allergens=\''+JSON.stringify(item.allergens)+'\'>';
      html += '<div class="item-top"><span class="item-name">'+name+'</span><span class="item-price">'+priceStr+'</span></div>';
      if (desc) html += '<div class="item-desc">'+desc+'</div>';
      if (extra) html += '<div class="item-extra">'+extra+'</div>';
      if (item.allergens.length) {
        html += '<div class="item-allergens">';
        item.allergens.forEach(a => {
          const info = ALLERGEN_INFO[a];
          if (info) html += '<span class="allergen-tag" data-allergen="'+a+'">'+info.emoji+' '+getT(info.label, currentLang)+'</span>';
        });
        html += '</div>';
      }
      html += '</div>';
    });
    
    section.innerHTML = html;
    container.appendChild(section);
  });
}

function updateI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[key]) el.textContent = getT(I18N[key], currentLang);
  });
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.documentElement.lang = lang;
  buildNav();
  buildMenu();
  buildAllergenFilters();
  updateI18n();
  filterMenu();
}

// Init
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

setLang('es');
</script>
</body>
</html>
